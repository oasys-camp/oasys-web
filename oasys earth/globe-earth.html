<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASYS · Earth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #globe-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <script>
        // Inicializar el globo con Globe.gl
        const myGlobe = new Globe(document.getElementById('globe-container'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .backgroundColor('#000000')
            .showAtmosphere(true)
            .atmosphereColor('#3a8cff')
            .atmosphereAltitude(0.15);

        // Configurar rotación automática
        myGlobe.controls().autoRotate = true;
        myGlobe.controls().autoRotateSpeed = 0.5;

        // Ajustar cámara para ver la Tierra completa
        myGlobe.pointOfView({ lat: 40.0, lng: -3.5, altitude: 2.5 });

        console.log('🌍 Earth rotating with Globe.gl + Three.js');
    </script>
</body>
</html>
