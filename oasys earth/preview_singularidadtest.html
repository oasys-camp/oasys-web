<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASYS · Earth Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #globe-container {
            width: 100vw;
            height: 100vh;
        }

        #milestone-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 8px;
            border: 0.5px solid #CCFF00;
            color: white;
            font-size: 12px;
            z-index: 1000;
            max-width: 300px;
        }

        #milestone-indicator h4 {
            margin: 0 0 10px 0;
            color: #CCFF00;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .milestone-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            border-left: 3px solid #CCFF00;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .milestone-time {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(204, 255, 0, 0.3);
                border-left-color: #CCFF00;
            }
            50% {
                box-shadow: 0 0 15px rgba(204, 255, 0, 0.6);
                border-left-color: #00FF88;
            }
        }

        #system-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 8px;
            border: 0.5px solid #CCFF00;
            color: white;
            font-size: 11px;
            z-index: 1000;
            max-width: 250px;
        }

        #system-status h4 {
            margin: 0 0 10px 0;
            color: #CCFF00;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .status-item {
            margin: 5px 0;
            padding: 5px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            border-left: 2px solid #CCFF00;
        }

        .status-label {
            color: #CCFF00;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
        }

        .status-value {
            color: white;
            font-size: 12px;
        }

        #clock {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #CCFF00;
            text-align: center;
            margin-top: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>

    <div id="system-status">
        <h4>🌍 SYSTEM STATUS</h4>
        <div class="status-item">
            <div class="status-label">ADMINISTRATOR</div>
            <div class="status-value">leonardo@oasysbasecamp.com</div>
        </div>
        <div class="status-item">
            <div class="status-label">MODE</div>
            <div class="status-value">LIVE ROTATION</div>
        </div>
        <div class="status-item">
            <div class="status-label">ALTITUDE</div>
            <div class="status-value">2.0 SAFE</div>
        </div>
        <div id="clock">00:00:00.000</div>
    </div>

    <div id="milestone-indicator">
        <h4>🎯 INSTITUTIONAL MILESTONES</h4>
        <div id="milestone-list">
            <div style="color: #888; font-style: italic;">AWAITING MILESTONES...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <script>
        console.log('🌍 OASYS Earth Live iniciando...');

        // ============================================
        // SISTEMA DE HITOS INSTITUCIONALES
        // ============================================

        const milestones = [];

        function injectMilestone(milestoneData) {
            console.log('🎯 Inyectando hito institucional:', milestoneData);

            const milestone = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                title: milestoneData.title || 'Hito sin título',
                description: milestoneData.description || '',
                category: milestoneData.category || 'general',
                priority: milestoneData.priority || 'normal',
                location: milestoneData.location || null,
                metadata: milestoneData.metadata || {}
            };

            milestones.push(milestone);
            updateMilestoneDisplay();
            notifyMilestone(milestone);

            return milestone;
        }

        function updateMilestoneDisplay() {
            const listElement = document.getElementById('milestone-list');

            if (milestones.length === 0) {
                listElement.innerHTML = '<div style="color: #888; font-style: italic;">AWAITING MILESTONES...</div>';
                return;
            }

            listElement.innerHTML = milestones.slice(-5).reverse().map(m => `
                <div class="milestone-item">
                    <div style="font-weight: bold; color: #CCFF00;">${m.title}</div>
                    <div style="font-size: 11px; margin-top: 4px;">${m.description}</div>
                    <div class="milestone-time">${new Date(m.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function notifyMilestone(milestone) {
            console.log('📢 Notificación de hito:', milestone);

            if (window.chatSystem && window.chatSystem.injectMessage) {
                window.chatSystem.injectMessage({
                    type: 'milestone',
                    content: milestone,
                    timestamp: milestone.timestamp
                });
            }
        }

        // ============================================
        // SISTEMA DE RELOJ CON MILISEGUNDOS
        // ============================================

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const milliseconds = String(now.getMilliseconds()).padStart(3, '0');

            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}.${milliseconds}`;
        }

        setInterval(updateClock, 10); // Actualizar cada 10ms para milisegundos suaves

        // ============================================
        // CONFIGURACIÓN DE GLOBO
        // ============================================

        window.addEventListener('load', function() {
            setTimeout(function() {
                try {
                    const container = document.getElementById('globe-container');

                    // Crear globo con atmósfera cósmica
                    const world = Globe()
                        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-day.jpg')
                        .backgroundColor('rgba(0,0,0,0)')
                        .showAtmosphere(true)
                        .atmosphereColor('#4a90e2')
                        .atmosphereAltitude(0.35)(container);

                    // Configurar cámara para globo más grande
                    world.controls().autoRotate = true;
                    world.controls().autoRotateSpeed = 0.8;
                    world.pointOfView({
                        lat: 40.0,
                        lng: -3.5,
                        altitude: 2.0
                    });

                    // Mantener rotación continua
                    setInterval(() => {
                        if (world.controls()) {
                            world.controls().update();
                        }
                    }, 16);

                    console.log('✅ OASYS Earth Live activo con estética premium');
                    console.log('🎯 Sistema de hitos listo para recibir datos');

                    // Exponer funciones para uso externo
                    window.OasysEarth = {
                        injectMilestone: injectMilestone,
                        getMilestones: () => milestones,
                        globe: world
                    };

                    // Ejemplo de hito inicial
                    injectMilestone({
                        title: 'SISTEMA OASYS EARTH LIVE',
                        description: 'Visualización 3D con estética premium y rotación continua',
                        category: 'system',
                        priority: 'high',
                        location: { lat: 40.0, lng: -3.5 }
                    });

                } catch (error) {
                    console.error('❌ Error en OASYS Earth Live:', error);
                }
            }, 500);
        });

        console.log('🔧 Sistema de hitos institucionales cargado');
        console.log('📋 Usa window.OasysEarth.injectMilestone() para añadir hitos');
    </script>
</body>
</html>
