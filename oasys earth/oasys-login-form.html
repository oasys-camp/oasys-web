<!-- ══════════════════════════════════════════════════════════════════════════════
     OASYS.EARTH · FORMULARIO DE IDENTIFICACIÓN
     Reemplaza el botón simple de "INICIAR CONVERSACIÓN"
     ══════════════════════════════════════════════════════════════════════════════ -->

<!-- LOGIN SCREEN (After 15s) -->
<div id="login-screen">
    <p class="login-sub">
        OASYS BASE CAMP<br>
        Regeneración de la tierra · LAT 40°N
    </p>
    
    <!-- Identification Form -->
    <div class="identification-form" id="id-form">
        <div class="form-header">
            <div class="form-title">TRANSPARENCIA RECÍPROCA</div>
            <div class="form-subtitle">Tú nos cuentas quién eres.<br>Nosotros te mostramos datos en tiempo real.</div>
        </div>
        
        <div class="form-field">
            <label for="user-name">Nombre</label>
            <input type="text" id="user-name" placeholder="Tu nombre" required>
        </div>
        
        <div class="form-field">
            <label for="user-email">Email</label>
            <input type="email" id="user-email" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-field">
            <label for="user-intent">¿Qué te trae aquí?</label>
            <select id="user-intent" required>
                <option value="">Selecciona una opción</option>
                <option value="curious">Curiosidad sobre el proyecto</option>
                <option value="bsg">Interés en El Bosque Sagrado (BSG)</option>
                <option value="investor">Explorar inversión / participación</option>
                <option value="press">Contacto profesional / prensa</option>
                <option value="agriculture">Agricultor / técnico del sector</option>
                <option value="other">Otro</option>
            </select>
        </div>
        
        <button class="start-conversation-btn" onclick="submitIdentification()">
            <span>INICIAR CONVERSACIÓN</span>
            <span class="enter-arrow">→</span>
        </button>
        
        <div class="privacy-note">
            Al continuar, aceptas que guardemos tu información para mejorar la experiencia.<br>
            <a href="#" style="color:var(--teal);text-decoration:none;font-size:11px;">Política de privacidad</a>
        </div>
    </div>
</div>

<!-- Estilos adicionales para privacy note -->
<style>
.privacy-note {
    margin-top: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: rgba(245,240,232,0.25);
    text-align: center;
    line-height: 1.6;
}

.start-conversation-btn {
    width: 100%;
    margin-top: 8px;
}
</style>
