<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OASYS BASECAMP · Visual Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: none;
    }

    #label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(168, 162, 158, 0.22);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(34, 197, 94, 0.28);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div id="label">OASYS BASECAMP · VISUAL LAB · R&amp;D · LAT 40°N</div>
  <div id="hint">move to repel · double-click to reset</div>

  <script src="particles.js"></script>
  <script>
    const engine = new ParticleEngine(document.getElementById('canvas'), {
      text:        'OASYS BASECAMP',
      colorA:      { h: 142, s: 71, l: 45 },   // #22c55e verde bosque
      colorB:      { h:  20, s:  5, l: 64 },   // #a8a29e tierra
      bgColor:     '#0f172a',
      repelRadius: 130,
      repelForce:  14,
      N:           10000
    });

    engine.onReset = function () {
      document.getElementById('hint').style.opacity = '0.4';
    };

    engine.start();

    // Brief sphere intro, then form the word
    setTimeout(() => {
      engine.formWord('OASYS BASECAMP');
      document.getElementById('hint').style.opacity = '1';
    }, 900);
  </script>

</body>
</html>
